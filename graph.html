<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PubCrawl — Dependency Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e14;--bg2:#0f1319;--bg3:#151b24;--bg4:#1a2230;
  --border:#1e2a3a;--border2:#283848;
  --text:#c8d6e5;--text2:#8899aa;--text3:#556677;
  --accent:#3ecf8e;--accent2:#2eb67d;
  --blue:#4aa3ff;--orange:#f5a623;--pink:#e879a8;--purple:#b49bff;--cyan:#56d4dd;
  --red:#f85149;
  --font-mono:'JetBrains Mono',monospace;
  --font-sans:'DM Sans',sans-serif;
  --font-serif:'Instrument Serif',serif;
}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);overflow:hidden;height:100vh}
::selection{background:var(--accent);color:var(--bg)}

.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(10,14,20,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:.75rem 2rem;display:flex;align-items:center;gap:1.5rem;
}
.header .logo{font-family:var(--font-mono);font-weight:600;font-size:1.1rem;color:var(--accent)}
.header .logo span{color:var(--text3);font-weight:300}
.header nav{display:flex;gap:1rem;margin-left:auto;font-size:.85rem}
.header nav a{color:var(--text2);padding:.35rem .7rem;border-radius:6px;transition:all .2s;text-decoration:none}
.header nav a:hover,.header nav a.active{color:var(--text);background:var(--bg3)}

.canvas-wrap{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  overflow:hidden;cursor:grab;
}
.canvas-wrap.dragging{cursor:grabbing}

svg{width:100%;height:100%}

/* NODES */
.node{cursor:pointer;transition:opacity .3s}
.node rect{rx:10;ry:10;stroke-width:1.5;transition:all .25s}
.node text{font-family:var(--font-mono);pointer-events:none}
.node .label{font-size:11px;fill:var(--text)}
.node .sublabel{font-size:9px;fill:var(--text3)}
.node:hover rect{filter:brightness(1.3);stroke-width:2}

/* EDGES */
.edge{transition:opacity .3s, stroke-opacity .3s}
.edge line,.edge path{stroke-width:1.2;fill:none}

/* DIM state */
svg.highlighting .node.dim{opacity:0.12}
svg.highlighting .edge.dim{opacity:0.05}
svg.highlighting .node.highlight rect{filter:brightness(1.4);stroke-width:2.5}
svg.highlighting .edge.highlight line,
svg.highlighting .edge.highlight path{stroke-width:2.5;stroke-opacity:1}

/* LEGEND */
.legend{
  position:fixed;bottom:1.5rem;left:1.5rem;z-index:50;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:1rem 1.25rem;font-size:.75rem;
  display:flex;flex-direction:column;gap:.4rem;
}
.legend-item{display:flex;align-items:center;gap:.5rem;font-family:var(--font-mono)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* INFO PANEL */
.info-panel{
  position:fixed;top:72px;right:1.5rem;z-index:50;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:1.25rem;width:280px;font-size:.82rem;
  opacity:0;pointer-events:none;transition:all .3s;transform:translateY(-8px);
}
.info-panel.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
.info-panel h3{font-family:var(--font-mono);font-size:.9rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.info-panel .info-type{font-size:.65rem;padding:.15rem .4rem;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.info-panel p{color:var(--text2);line-height:1.5;margin-bottom:.5rem}
.info-panel .info-deps{font-family:var(--font-mono);font-size:.72rem;color:var(--text3)}
.info-panel .info-deps span{color:var(--text2)}
.info-panel .info-lines{font-family:var(--font-mono);font-size:.72rem;color:var(--text3);margin-top:.25rem}
</style>
</head>
<body>

<header class="header">
  <div class="logo">pubcrawl <span>wiki</span></div>
  <nav>
    <a href="index.html">Overview</a>
    <a href="graph.html" class="active">Dependency Graph</a>
  </nav>
</header>

<div class="canvas-wrap" id="canvasWrap">
<svg id="graph" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="legend">
  <div style="font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem">Legend</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Entry point</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Tool (MCP)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> Library</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> External API</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div> Types / Config</div>
  <div style="font-size:.65rem;color:var(--text3);margin-top:.4rem">Hover a node to trace dependencies</div>
</div>

<div class="info-panel" id="infoPanel">
  <h3 id="infoTitle"></h3>
  <p id="infoDesc"></p>
  <div class="info-deps" id="infoDeps"></div>
  <div class="info-lines" id="infoLines"></div>
</div>

<script>
const nodes = [
  // Entry — top center
  {id:'index',x:540,y:60,w:160,h:40,label:'index.ts',sub:'Entry · MCP Server',type:'entry',lines:50,
   desc:'Creates McpServer, configures NCBI API key, registers all 12 tools, starts StdioServerTransport.'},

  // Tools — row 2
  {id:'search',x:60,y:180,w:130,h:36,label:'search',sub:'search_pubmed',type:'tool',lines:83,
   desc:'Search PubMed with date range, article type, sort order filters.'},
  {id:'abstract',x:210,y:180,w:130,h:36,label:'abstract',sub:'get_abstract',type:'tool',lines:133,
   desc:'Full structured abstract with labeled sections, keywords, MeSH terms.'},
  {id:'fulltext',x:360,y:180,w:130,h:36,label:'fulltext',sub:'get_full_text',type:'tool',lines:117,
   desc:'Open-access full text from PMC — sections, figures, tables, references.'},
  {id:'related',x:510,y:180,w:130,h:36,label:'related',sub:'find_related',type:'tool',lines:76,
   desc:'Similar articles via PubMed neighbor algorithm, ranked by relevance.'},
  {id:'cite',x:660,y:180,w:130,h:36,label:'cite',sub:'format_citation',type:'tool',lines:225,
   desc:'APA, Vancouver, Harvard, or BibTeX citations from PMID.'},
  {id:'trending',x:810,y:180,w:130,h:36,label:'trending',sub:'trending_papers',type:'tool',lines:122,
   desc:'Recent papers, optionally filtered to high-impact journals.'},
  {id:'uspi',x:60,y:240,w:130,h:36,label:'uspi',sub:'get_uspi',type:'tool',lines:141,
   desc:'US Prescribing Information from DailyMed. Parsed FDA SPL XML.'},
  {id:'smpc',x:210,y:240,w:130,h:36,label:'smpc',sub:'get_smpc',type:'tool',lines:66,
   desc:'UK Summary of Product Characteristics from eMC.'},
  {id:'compare',x:360,y:240,w:155,h:36,label:'compare-labels',sub:'compare_labels',type:'tool',lines:154,
   desc:'Side-by-side US vs UK labelling comparison across mapped sections.'},
  {id:'indication',x:540,y:240,w:170,h:36,label:'search-indication',sub:'search_by_indication',type:'tool',lines:94,
   desc:'Drugs approved for a condition — FDA search cross-referenced with UK eMC.'},
  {id:'tsearch',x:735,y:240,w:140,h:36,label:'trials-search',sub:'search_trials',type:'tool',lines:78,
   desc:'Search ClinicalTrials.gov by condition, intervention, status, phase.'},
  {id:'tdetail',x:895,y:240,w:140,h:36,label:'trials-detail',sub:'get_trial',type:'tool',lines:51,
   desc:'Full trial details — eligibility, design, arms, outcomes.'},

  // Libraries — row 3
  {id:'ncbi',x:120,y:380,w:150,h:40,label:'lib/ncbi.ts',sub:'NCBI E-Utilities',type:'lib',lines:221,
   desc:'esearch, efetch, elink, esummary, pmidToPmcid. Rate-limited (300ms / 100ms with API key).'},
  {id:'xmlparser',x:310,y:380,w:170,h:40,label:'lib/xml-parser.ts',sub:'XML / JATS / SPL',type:'lib',lines:296,
   desc:'Parses PubMed XML, JATS full text, and FDA SPL structured labels using fast-xml-parser.'},
  {id:'emc',x:520,y:380,w:140,h:40,label:'lib/emc.ts',sub:'eMC scraper',type:'lib',lines:241,
   desc:'Searches medicines.org.uk, fetches SmPC HTML, parses numbered sections with Cheerio.'},
  {id:'dailymed',x:700,y:380,w:155,h:40,label:'lib/dailymed.ts',sub:'DailyMed API',type:'lib',lines:78,
   desc:'SPL XML retrieval from DailyMed/NLM services. 200ms rate limit.'},
  {id:'openfda',x:120,y:445,w:155,h:40,label:'lib/openfda.ts',sub:'OpenFDA client',type:'lib',lines:117,
   desc:'Drug label search by indication via api.fda.gov. 300ms rate limit.'},
  {id:'clintrials',x:310,y:445,w:180,h:40,label:'lib/clinicaltrials.ts',sub:'CT.gov v2 API',type:'lib',lines:261,
   desc:'ClinicalTrials.gov v2 API client. 1.2s rate limit (~50 req/min).'},
  {id:'cache',x:530,y:445,w:140,h:40,label:'lib/cache.ts',sub:'LRU Cache',type:'lib',lines:66,
   desc:'500-entry LRU cache with per-type TTLs (1h–24h). Shared across all libraries.'},
  {id:'labelmap',x:710,y:445,w:170,h:40,label:'lib/label-mapping.ts',sub:'LOINC ↔ SmPC',type:'lib',lines:33,
   desc:'Maps US LOINC codes to UK SmPC section numbers for cross-label comparison.'},

  // External APIs — row 4
  {id:'api_ncbi',x:80,y:570,w:150,h:36,label:'NCBI E-Utilities',sub:'eutils.ncbi.nlm.nih.gov',type:'ext',lines:0,
   desc:'PubMed search, fetch, link, summary. 3 req/s (10 with API key).'},
  {id:'api_pmc',x:260,y:570,w:140,h:36,label:'PubMed Central',sub:'PMC OA Service',type:'ext',lines:0,
   desc:'Open-access full text articles in JATS XML format.'},
  {id:'api_dailymed',x:430,y:570,w:140,h:36,label:'DailyMed',sub:'dailymed.nlm.nih.gov',type:'ext',lines:0,
   desc:'FDA Structured Product Labels (SPL XML).'},
  {id:'api_openfda',x:600,y:570,w:130,h:36,label:'OpenFDA',sub:'api.fda.gov',type:'ext',lines:0,
   desc:'Drug label search and adverse event data.'},
  {id:'api_emc',x:760,y:570,w:130,h:36,label:'eMC',sub:'medicines.org.uk',type:'ext',lines:0,
   desc:'UK medicines compendium — SmPC and PIL documents.'},
  {id:'api_ctgov',x:920,y:570,w:150,h:36,label:'ClinicalTrials.gov',sub:'v2 API',type:'ext',lines:0,
   desc:'US clinical trial registry. REST API v2.'},

  // Types — bottom
  {id:'types',x:440,y:520,w:140,h:36,label:'types.ts',sub:'27 interfaces',type:'types',lines:168,
   desc:'All shared type definitions: PubMedArticle, FullAbstract, USPIResult, SmPCResult, ClinicalTrialDetail, etc.'},
];

const edges = [
  // index → tools
  ...['search','abstract','fulltext','related','cite','trending','uspi','smpc','compare','indication','tsearch','tdetail']
    .map(t => ({from:'index',to:t,color:'var(--accent)'})),

  // Literature tools → libs
  {from:'search',to:'ncbi'},{from:'search',to:'xmlparser'},
  {from:'abstract',to:'ncbi'},{from:'abstract',to:'xmlparser'},
  {from:'fulltext',to:'ncbi'},{from:'fulltext',to:'xmlparser'},
  {from:'related',to:'ncbi'},{from:'related',to:'xmlparser'},
  {from:'cite',to:'ncbi'},{from:'cite',to:'xmlparser'},
  {from:'trending',to:'ncbi'},{from:'trending',to:'xmlparser'},

  // Drug tools → libs
  {from:'uspi',to:'dailymed'},{from:'uspi',to:'xmlparser'},
  {from:'smpc',to:'emc'},
  {from:'compare',to:'dailymed'},{from:'compare',to:'emc'},{from:'compare',to:'xmlparser'},{from:'compare',to:'labelmap'},
  {from:'indication',to:'openfda'},{from:'indication',to:'emc'},

  // Trial tools → libs
  {from:'tsearch',to:'clintrials'},
  {from:'tdetail',to:'clintrials'},

  // Libs → cache
  {from:'ncbi',to:'cache'},{from:'emc',to:'cache'},{from:'dailymed',to:'cache'},
  {from:'openfda',to:'cache'},{from:'clintrials',to:'cache'},

  // Libs → external
  {from:'ncbi',to:'api_ncbi'},{from:'ncbi',to:'api_pmc'},
  {from:'dailymed',to:'api_dailymed'},
  {from:'openfda',to:'api_openfda'},
  {from:'emc',to:'api_emc'},
  {from:'clintrials',to:'api_ctgov'},

  // Types (used by many — show key connections)
  {from:'ncbi',to:'types',color:'var(--pink)'},{from:'xmlparser',to:'types',color:'var(--pink)'},
  {from:'emc',to:'types',color:'var(--pink)'},{from:'clintrials',to:'types',color:'var(--pink)'},
  {from:'openfda',to:'types',color:'var(--pink)'},{from:'dailymed',to:'types',color:'var(--pink)'},
];

const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

// Build adjacency for highlighting
const adj = {};
nodes.forEach(n => adj[n.id] = new Set());
edges.forEach(e => { adj[e.from].add(e.to); adj[e.to].add(e.from); });

function getConnected(id) {
  const visited = new Set();
  const queue = [id];
  visited.add(id);
  // BFS 2 levels deep
  let depth = 0;
  let levelSize = queue.length;
  while (queue.length && depth < 3) {
    const cur = queue.shift();
    for (const nb of adj[cur]) {
      if (!visited.has(nb)) { visited.add(nb); queue.push(nb); }
    }
    levelSize--;
    if (levelSize === 0) { depth++; levelSize = queue.length; }
  }
  return visited;
}

const svg = document.getElementById('graph');
const svgNS = 'http://www.w3.org/2000/svg';

// Set viewBox
svg.setAttribute('viewBox', '0 0 1100 640');
svg.style.minHeight = '100%';

// Defs for arrowheads
const defs = document.createElementNS(svgNS,'defs');
['var(--accent)','var(--blue)','var(--purple)','var(--orange)','var(--pink)','var(--text3)'].forEach((c,i) => {
  const marker = document.createElementNS(svgNS,'marker');
  marker.setAttribute('id','arrow'+i);
  marker.setAttribute('viewBox','0 0 10 7');
  marker.setAttribute('refX','10');marker.setAttribute('refY','3.5');
  marker.setAttribute('markerWidth','8');marker.setAttribute('markerHeight','6');
  marker.setAttribute('orient','auto-start-reverse');
  const path = document.createElementNS(svgNS,'path');
  path.setAttribute('d','M 0 0 L 10 3.5 L 0 7 z');
  path.setAttribute('fill',c);path.setAttribute('opacity','0.6');
  marker.appendChild(path);
  defs.appendChild(marker);
});
svg.appendChild(defs);

const colorMap = {'var(--accent)':0,'var(--blue)':1,'var(--purple)':2,'var(--orange)':3,'var(--pink)':4,'var(--text3)':5};

const typeColors = {
  entry:{fill:'rgba(62,207,142,0.1)',stroke:'rgba(62,207,142,0.5)',text:'var(--accent)'},
  tool:{fill:'rgba(74,163,255,0.08)',stroke:'rgba(74,163,255,0.35)',text:'var(--blue)'},
  lib:{fill:'rgba(180,155,255,0.08)',stroke:'rgba(180,155,255,0.35)',text:'var(--purple)'},
  ext:{fill:'rgba(245,166,35,0.08)',stroke:'rgba(245,166,35,0.35)',text:'var(--orange)'},
  types:{fill:'rgba(232,121,168,0.08)',stroke:'rgba(232,121,168,0.35)',text:'var(--pink)'},
};

function defaultEdgeColor(from, to) {
  const f = nodeMap[from], t = nodeMap[to];
  if (f.type === 'entry') return 'var(--accent)';
  if (t.type === 'ext') return 'var(--orange)';
  if (f.type === 'tool') return 'var(--blue)';
  if (f.type === 'lib' && t.type === 'lib') return 'var(--purple)';
  return 'var(--text3)';
}

// Draw edges
const edgeEls = [];
const edgesG = document.createElementNS(svgNS,'g');
edges.forEach(e => {
  const from = nodeMap[e.from], to = nodeMap[e.to];
  const x1 = from.x + from.w/2, y1 = from.y + from.h;
  const x2 = to.x + to.w/2, y2 = to.y;
  const color = e.color || defaultEdgeColor(e.from, e.to);
  const arrowIdx = colorMap[color] ?? 5;

  const g = document.createElementNS(svgNS,'g');
  g.classList.add('edge');
  g.dataset.from = e.from;
  g.dataset.to = e.to;

  // Curved path
  const midY = (y1 + y2) / 2;
  const path = document.createElementNS(svgNS,'path');
  path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`);
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-opacity', '0.3');
  path.setAttribute('marker-end', `url(#arrow${arrowIdx})`);
  g.appendChild(path);
  edgesG.appendChild(g);
  edgeEls.push({el:g, from:e.from, to:e.to});
});
svg.appendChild(edgesG);

// Draw nodes
const nodeEls = [];
const nodesG = document.createElementNS(svgNS,'g');
nodes.forEach(n => {
  const tc = typeColors[n.type] || typeColors.lib;
  const g = document.createElementNS(svgNS,'g');
  g.classList.add('node');
  g.dataset.id = n.id;

  const rect = document.createElementNS(svgNS,'rect');
  rect.setAttribute('x', n.x);rect.setAttribute('y', n.y);
  rect.setAttribute('width', n.w);rect.setAttribute('height', n.h);
  rect.setAttribute('fill', tc.fill);rect.setAttribute('stroke', tc.stroke);
  g.appendChild(rect);

  const text = document.createElementNS(svgNS,'text');
  text.setAttribute('x', n.x + n.w/2);text.setAttribute('y', n.y + n.h/2 - 2);
  text.setAttribute('text-anchor','middle');text.setAttribute('dominant-baseline','middle');
  text.classList.add('label');text.setAttribute('fill',tc.text);
  text.textContent = n.label;
  g.appendChild(text);

  if (n.sub) {
    const sub = document.createElementNS(svgNS,'text');
    sub.setAttribute('x', n.x + n.w/2);sub.setAttribute('y', n.y + n.h/2 + 11);
    sub.setAttribute('text-anchor','middle');sub.setAttribute('dominant-baseline','middle');
    sub.classList.add('sublabel');
    sub.textContent = n.sub;
    g.appendChild(sub);
  }

  nodesG.appendChild(g);
  nodeEls.push({el:g, id:n.id});
});
svg.appendChild(nodesG);

// Info panel
const infoPanel = document.getElementById('infoPanel');
const infoTitle = document.getElementById('infoTitle');
const infoDesc = document.getElementById('infoDesc');
const infoDeps = document.getElementById('infoDeps');
const infoLines = document.getElementById('infoLines');

const typeBadgeColors = {
  entry:'background:rgba(62,207,142,0.15);color:var(--accent)',
  tool:'background:rgba(74,163,255,0.15);color:var(--blue)',
  lib:'background:rgba(180,155,255,0.15);color:var(--purple)',
  ext:'background:rgba(245,166,35,0.15);color:var(--orange)',
  types:'background:rgba(232,121,168,0.15);color:var(--pink)',
};
const typeLabels = {entry:'Entry',tool:'Tool',lib:'Library',ext:'External API',types:'Types'};

function showInfo(n) {
  infoTitle.innerHTML = `${n.label} <span class="info-type" style="${typeBadgeColors[n.type]}">${typeLabels[n.type]}</span>`;
  infoDesc.textContent = n.desc;

  // Show what this node connects to
  const deps = [...adj[n.id]].map(id => nodeMap[id].label).join(', ');
  infoDeps.innerHTML = deps ? `Connected to: <span>${deps}</span>` : '';
  infoLines.textContent = n.lines ? `${n.lines} lines` : '';
  infoPanel.classList.add('visible');
}

function hideInfo() {
  infoPanel.classList.remove('visible');
}

// Hover highlighting
let activeNode = null;

nodesG.addEventListener('mouseover', e => {
  const g = e.target.closest('.node');
  if (!g) return;
  const id = g.dataset.id;
  if (activeNode === id) return;
  activeNode = id;

  const connected = getConnected(id);
  svg.classList.add('highlighting');

  nodeEls.forEach(({el, id:nid}) => {
    el.classList.toggle('highlight', connected.has(nid));
    el.classList.toggle('dim', !connected.has(nid));
  });
  edgeEls.forEach(({el, from, to}) => {
    const on = connected.has(from) && connected.has(to);
    el.classList.toggle('highlight', on);
    el.classList.toggle('dim', !on);
  });

  showInfo(nodeMap[id]);
});

nodesG.addEventListener('mouseout', e => {
  const g = e.target.closest('.node');
  if (!g) return;
  // Check if we're moving to another node
  const related = e.relatedTarget?.closest?.('.node');
  if (related) return;

  activeNode = null;
  svg.classList.remove('highlighting');
  nodeEls.forEach(({el}) => { el.classList.remove('highlight','dim'); });
  edgeEls.forEach(({el}) => { el.classList.remove('highlight','dim'); });
  hideInfo();
});

// Pan support
const wrap = document.getElementById('canvasWrap');
let isPanning = false, panStart = {x:0,y:0}, viewBox = {x:0,y:0,w:1100,h:640};

function updateViewBox() {
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
}

wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  isPanning = true;
  panStart = {x:e.clientX, y:e.clientY};
  wrap.classList.add('dragging');
});

window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  const dx = (e.clientX - panStart.x) * (viewBox.w / wrap.clientWidth);
  const dy = (e.clientY - panStart.y) * (viewBox.h / wrap.clientHeight);
  viewBox.x -= dx; viewBox.y -= dy;
  panStart = {x:e.clientX, y:e.clientY};
  updateViewBox();
});

window.addEventListener('mouseup', () => { isPanning = false; wrap.classList.remove('dragging'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const scale = e.deltaY > 0 ? 1.08 : 0.93;
  const rect = wrap.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width;
  const my = (e.clientY - rect.top) / rect.height;

  const newW = viewBox.w * scale, newH = viewBox.h * scale;
  viewBox.x += (viewBox.w - newW) * mx;
  viewBox.y += (viewBox.h - newH) * my;
  viewBox.w = newW; viewBox.h = newH;
  updateViewBox();
}, {passive:false});
</script>
